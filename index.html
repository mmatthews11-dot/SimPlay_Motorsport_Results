<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Results Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2E2E31;
    --panel:#3A3A3D;
    --panel-2:#454548;
    --line:#54545A;
    --text:#E7ECEF;
    --text-dim:#7E8894;
    --amber:#FF7A1A;
    --purple:#B453FF;
    --green:#33E37D;
    --red:#FF4D4D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Mono', ui-monospace, monospace;
    min-height:100vh;
    padding:0 0 4rem;
  }
  h1,h2,h3,.label{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;}

  header.hero{
    position:relative;
    border-bottom:1px solid var(--line);
    padding:2.2rem 1.5rem 1.6rem;
    background:
      linear-gradient(180deg, rgba(255,122,26,0.08), transparent 60%);
  }
  .social-links{
    position:absolute;
    top:1.3rem;
    right:1.5rem;
    display:flex;
    align-items:center;
    gap:.9rem;
  }
  .social-links a{
    color:var(--text-dim);
    display:flex;
    transition:color .15s;
  }
  .social-links a:hover{color:#fff;}
  .social-links svg{width:20px;height:20px;fill:currentColor;}
  .donate-btn{
    background:var(--amber);
    color:#111 !important;
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:.75rem;
    font-weight:700;
    padding:.4rem .9rem;
    border-radius:16px;
    text-decoration:none;
  }
  .donate-btn:hover{color:#111 !important;filter:brightness(1.1);}
  .hero-inner{max-width:960px;margin:0 auto;}
  .team-logo{
    height:120px;
    margin-bottom:1rem;
    display:block;
  }
  .sponsor-strip{
    display:flex;
    align-items:center;
    gap:.7rem;
    margin-bottom:1.2rem;
    text-decoration:none;
    color:var(--text-dim);
    font-size:.8rem;
  }
  .sponsor-strip img{
    height:50px;
  }
  .eyebrow{color:var(--amber);font-size:.78rem;font-weight:600;letter-spacing:.14em;margin:0 0 .4rem;}
  h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;margin:0 0 .3rem;color:#fff;}
  .server-name{color:var(--text-dim);font-family:'IBM Plex Mono';font-size:.92rem;}
  .sync-note{color:var(--text-dim);font-size:.75rem;margin-top:.6rem;}

  main{max-width:960px;margin:0 auto;padding:1.6rem 1.5rem 0;}

  .game-tabs{display:flex;gap:.6rem;margin-bottom:1.2rem;}
  .game-tab{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.1em;
    font-size:.95rem;
    font-weight:700;
    padding:.7rem 1.8rem;
    border-radius:6px;
    cursor:pointer;
  }
  .game-tab[aria-selected="true"]{
    background:var(--amber);
    border-color:var(--amber);
    color:#111;
  }

  .category-tabs{display:flex;gap:.5rem;margin-bottom:1rem;}
  .category-tab{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:.82rem;
    font-weight:600;
    padding:.5rem 1.3rem;
    border-radius:20px;
    cursor:pointer;
  }
  .category-tab[aria-selected="true"]{
    background:var(--amber);
    border-color:var(--amber);
    color:#111;
  }

  .session-tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.4rem;}
  .session-tab{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:.8rem;
    font-weight:600;
    padding:.55rem 1rem;
    border-radius:3px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:.15rem;
  }
  .session-tab .date{
    color:var(--text-dim);
    font-size:.68rem;
    font-family:'IBM Plex Mono';
    letter-spacing:.02em;
  }
  .session-tab[aria-selected="true"] .date{color:#d9d9d9;}
  .session-tab[aria-selected="true"]{
    color:#fff;
    border-color:var(--amber);
    box-shadow:inset 0 0 0 1px var(--amber);
  }
  .session-tab .track{color:var(--text-dim);font-weight:400;margin-left:.4rem;}
  .session-tab[aria-selected="true"] .track{color:#d9d9d9;}

  .board{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .board-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:1rem 1.2rem .9rem;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .board-head h2{font-size:1.15rem;margin:0;color:#fff;}
  .board-head .meta{color:var(--text-dim);font-family:'IBM Plex Mono';font-size:.78rem;}

  .class-tabs{display:flex;gap:.4rem;padding:.8rem 1.2rem 0;flex-wrap:wrap;}
  .class-tab{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:.72rem;
    font-weight:600;
    padding:.35rem .9rem;
    border-radius:14px;
    cursor:pointer;
  }
  .class-tab[aria-selected="true"]{
    background:var(--purple);
    border-color:var(--purple);
    color:#fff;
  }

  table{width:100%;border-collapse:collapse;}
  .table-scroll{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  table{min-width:640px;}
  thead th{
    text-align:left;
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    font-size:.68rem;
    letter-spacing:.08em;
    color:var(--text-dim);
    font-weight:600;
    padding:.55rem 1rem;
    border-bottom:1px solid var(--line);
  }
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  td{padding:.6rem 1rem;font-size:.86rem;vertical-align:middle;}
  td.pos{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;width:2.4rem;}
  td.num{color:var(--text-dim);}
  td.driver{color:#fff;font-family:'IBM Plex Mono';}
  td.driver .car{display:block;color:var(--text-dim);font-size:.74rem;margin-top:.1rem;}
  td.time{color:#fff;font-variant-numeric:tabular-nums;}
  td.time.best{color:var(--purple);}
  .gap-cell{display:flex;align-items:center;gap:.6rem;min-width:9rem;}
  .gap-bar-track{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
  .gap-bar-fill{height:100%;background:linear-gradient(90deg, var(--amber), var(--purple));}
  .gap-value{width:5.2rem;text-align:right;color:var(--text-dim);font-size:.8rem;}
  .pit-flag{color:var(--red);font-size:.72rem;margin-left:.4rem;}
  .status-flag{color:var(--red);font-size:.72rem;margin-left:.4rem;}

  .empty{
    padding:3rem 1.5rem;
    text-align:center;
    color:var(--text-dim);
  }
  .empty h2{color:#fff;margin-bottom:.5rem;}
  code{background:var(--panel-2);padding:.1rem .35rem;border-radius:3px;color:var(--amber);}

  footer{max-width:960px;margin:2rem auto 0;padding:0 1.5rem;color:var(--text-dim);font-size:.75rem;}

  @media (max-width: 640px) {
    header.hero{padding:1.6rem 1rem 1.2rem;}
    main{padding:1.2rem 1rem 0;}
    .team-logo{height:80px;}
    .board-head{flex-direction:column;align-items:flex-start;gap:.3rem;}
    .social-links{position:static;justify-content:center;margin-bottom:1rem;}
  }
</style>
</head>
<body>

  <div class="hero-inner">
    <img src="assets/SPM_Logo.png" alt="Team logo" class="team-logo">

<main>
  <nav class="game-tabs" id="game-tabs"></nav>
  <nav class="category-tabs" id="category-tabs"></nav>
  <nav class="session-tabs" id="session-tabs"></nav>
  <section class="board" id="board"></section>
</main>

<footer>
  ACC results pulled from the G-Portal server folder · LMU results pulled from public SimGrid pages.
</footer>

<script>
let DATA = { sessions: [], accLastSync: null, lmuLastSync: null };
let GAME = 'ACC';
let ACTIVE_ID = null;
let ACTIVE_CATEGORY = 'All';
let ACTIVE_CLASS = 'Overall';

async function fetchJson(path) {
  try {
    const res = await fetch(path, { cache: 'no-store' });
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

async function load() {
  const [accData, lmuData] = await Promise.all([
    fetchJson('data/acc-results.json'),
    fetchJson('data/lmu-results.json'),
  ]);

  const sessions = [
    ...((accData && accData.sessions) || []),
    ...((lmuData && lmuData.sessions) || []),
  ];

  DATA = {
    sessions,
    accLastSync: accData?.lastSync ?? null,
    lmuLastSync: lmuData?.lastSync ?? null,
  };
  render();
}

function formatSyncTime(iso) {
  if (!iso) return 'Not synced yet';
  const d = new Date(iso);
  return 'Last synced ' + d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function render() {
  const allSessions = DATA.sessions || [];

  document.getElementById('game-tabs').innerHTML = ['ACC', 'LMU'].map(g => `
    <button class="game-tab" data-game="${g}" aria-selected="${g === GAME}">${g}</button>
  `).join('');
  document.querySelectorAll('.game-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      GAME = btn.dataset.game;
      ACTIVE_ID = null;
      ACTIVE_CATEGORY = 'All';
      ACTIVE_CLASS = 'Overall';
      render();
    });
  });

  document.getElementById('sync-note').textContent =
    formatSyncTime(GAME === 'ACC' ? DATA.accLastSync : DATA.lmuLastSync);

  const gameSessions = allSessions.filter(s => s.game === GAME);

  if (gameSessions.length === 0) {
    document.getElementById('category-tabs').innerHTML = '';
    document.getElementById('session-tabs').innerHTML = '';
    document.getElementById('board').innerHTML = `
      <div class="empty">
        <h2>Waiting on the first ${GAME} sync</h2>
        <p>Once the sync workflow finds new results, sessions will show up here automatically.<br>
        Data source: <code>data/acc-results.json</code> / <code>data/lmu-results.json</code></p>
      </div>`;
    return;
  }

  // ACC has a PRO/PROAM (Wed/Thu) category split; LMU doesn't use this concept.
  if (GAME === 'ACC') {
    const categories = ['All', ...new Set(gameSessions.map(s => s.category || 'Other'))];
    document.getElementById('category-tabs').innerHTML = categories.map(cat => `
      <button class="category-tab" data-cat="${cat}" aria-selected="${cat === ACTIVE_CATEGORY}">${cat}</button>
    `).join('');
    document.querySelectorAll('.category-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        ACTIVE_CATEGORY = btn.dataset.cat;
        ACTIVE_ID = null;
        ACTIVE_CLASS = 'Overall';
        render();
      });
    });
  } else {
    document.getElementById('category-tabs').innerHTML = '';
  }

  const sessions = (GAME === 'ACC' && ACTIVE_CATEGORY !== 'All')
    ? gameSessions.filter(s => (s.category || 'Other') === ACTIVE_CATEGORY)
    : gameSessions;

  if (sessions.length === 0) {
    document.getElementById('session-tabs').innerHTML = '';
    document.getElementById('board').innerHTML = `<div class="empty"><h2>No ${ACTIVE_CATEGORY} sessions yet</h2></div>`;
    return;
  }

  if (!ACTIVE_ID || !sessions.find(s => s.id === ACTIVE_ID)) {
    ACTIVE_ID = sessions[0].id;
  }

  document.getElementById('session-tabs').innerHTML = sessions.map(s => `
    <button class="session-tab" data-id="${s.id}" aria-selected="${s.id === ACTIVE_ID}">
      <span class="tab-main">${s.sessionName}<span class="track">${s.trackName}</span></span>
      <span class="date">${s.sessionDate || ''}</span>
    </button>
  `).join('');

  document.querySelectorAll('.session-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      ACTIVE_ID = btn.dataset.id;
      ACTIVE_CLASS = 'Overall';
      render();
    });
  });

  const session = sessions.find(s => s.id === ACTIVE_ID);
  renderBoard(session);
}

function renderBoard(session) {
  if (session.game === 'LMU') {
    renderLmuBoard(session);
  } else {
    renderAccBoard(session);
  }
}

// ---- ACC: single flat `standings` array, with a combined "Overall" view ----
function renderAccBoard(session) {
  const isRace = session.sessionType.startsWith('R');
  const classes = ['Overall', ...new Set(session.standings.map(s => s.driverClass))];

  const rows = ACTIVE_CLASS === 'Overall'
    ? session.standings
    : session.standings.filter(s => s.driverClass === ACTIVE_CLASS);

  const leaderRef = rows[0]?.referenceTimeMs;
  const fastestMs = Math.min(...rows.map(r => r.bestLapMs ?? Infinity));

  const displayRows = rows.map((s, i) => {
    const position = ACTIVE_CLASS === 'Overall' ? s.position : s.classPosition;
    let gap = s.gap;
    if (ACTIVE_CLASS !== 'Overall') {
      const gapMs = (s.referenceTimeMs != null && leaderRef != null) ? s.referenceTimeMs - leaderRef : null;
      gap = i === 0 ? '-' : formatGap(gapMs);
    }
    return { ...s, position, gap, isFastestInView: s.bestLapMs === fastestMs };
  });

  const maxGapMs = Math.max(1, ...displayRows.map(s => (s.gap && s.gap !== '-') ? parseGapMs(s.gap) : 0));

  const rowsHtml = displayRows.map(s => {
    const gapMs = (s.gap && s.gap !== '-') ? parseGapMs(s.gap) : 0;
    const barPct = maxGapMs ? Math.min(100, (gapMs / maxGapMs) * 100) : 0;
    return `
      <tr>
        <td class="pos">${s.position}</td>
        <td class="num">#${s.raceNumber ?? '–'}</td>
        <td class="driver">
          ${s.driver}${s.hasMandatoryPitstopIssue ? '<span class="pit-flag">NO PIT</span>' : ''}
          <span class="car">${s.car} · ${s.driverClass}</span>
        </td>
        <td class="num">${s.laps ?? '–'}</td>
        <td class="time ${s.isFastestInView ? 'best' : ''}">${s.bestLap ?? '–'}</td>
        <td>
          <div class="gap-cell">
            <div class="gap-bar-track"><div class="gap-bar-fill" style="width:${barPct}%"></div></div>
            <span class="gap-value">${s.gap}</span>
          </div>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('board').innerHTML = `
    <div class="board-head">
      <h2>${session.sessionName} — ${session.trackName}</h2>
      <span class="meta">${session.isWetSession ? 'Wet' : 'Dry'} · ${session.penaltyCount} penalt${session.penaltyCount === 1 ? 'y' : 'ies'}</span>
    </div>
    <div class="class-tabs">
      ${classes.map(cls => `<button class="class-tab" data-class="${cls}" aria-selected="${cls === ACTIVE_CLASS}">${cls}</button>`).join('')}
    </div>
    <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Pos</th><th>No.</th><th>Driver</th><th>Laps</th><th>Best lap</th>
          <th>${isRace ? 'Gap' : 'Gap to P1'}</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    </div>
  `;

  document.querySelectorAll('.class-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      ACTIVE_CLASS = btn.dataset.class;
      renderAccBoard(session);
    });
  });
}

// ---- LMU: classes kept fully separate, no combined "Overall" view ----
function renderLmuBoard(session) {
  const isRace = session.sessionType === 'R';
  const classNames = Object.keys(session.standingsByClass || {});

  if (classNames.length === 0) {
    document.getElementById('board').innerHTML = `<div class="empty"><h2>No results in this session</h2></div>`;
    return;
  }

  if (ACTIVE_CLASS === 'Overall' || !classNames.includes(ACTIVE_CLASS)) {
    ACTIVE_CLASS = classNames[0];
  }

  const rows = session.standingsByClass[ACTIVE_CLASS] || [];
  const leaderRef = rows[0]?.referenceTimeMs;
  const fastestMs = Math.min(...rows.map(r => r.bestLapMs ?? Infinity));

  const maxGapMs = Math.max(1, ...rows.map(r => {
    if (isRace) return parseRaceGapMs(r.gapDisplay) || 0;
    if (r.referenceTimeMs == null || leaderRef == null) return 0;
    return Math.max(0, r.referenceTimeMs - leaderRef);
  }));

  const rowsHtml = rows.map((s, i) => {
    let gapDisplay, barPct;
    if (isRace) {
      gapDisplay = i === 0 ? '-' : (s.status !== 'FINISHED' ? s.status : (s.gapDisplay || '–'));
      const gapMs = parseRaceGapMs(s.gapDisplay);
      barPct = gapMs ? Math.min(100, (gapMs / maxGapMs) * 100) : (i === 0 ? 0 : 100);
    } else {
      const gapMs = (s.referenceTimeMs != null && leaderRef != null) ? s.referenceTimeMs - leaderRef : null;
      gapDisplay = i === 0 ? '-' : (s.status !== 'FINISHED' ? s.status : formatGap(gapMs));
      barPct = (maxGapMs && gapMs) ? Math.min(100, (gapMs / maxGapMs) * 100) : 0;
    }
    const isFastest = s.bestLapMs != null && s.bestLapMs === fastestMs;
    const statusFlag = s.status && s.status !== 'FINISHED' ? `<span class="status-flag">${s.status}</span>` : '';
    return `
      <tr>
        <td class="pos">${s.position}</td>
        <td class="num">#${s.raceNumber ?? '–'}</td>
        <td class="driver">
          ${s.driver}${statusFlag}
          <span class="car">${s.car || ''}</span>
        </td>
        <td class="num">${s.laps ?? '–'}</td>
        <td class="time ${isFastest ? 'best' : ''}">${s.bestLap ?? '–'}</td>
        <td>
          <div class="gap-cell">
            <div class="gap-bar-track"><div class="gap-bar-fill" style="width:${barPct}%"></div></div>
            <span class="gap-value">${gapDisplay}</span>
          </div>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('board').innerHTML = `
    <div class="board-head">
      <h2>${session.sessionName} — ${session.trackName}</h2>
      <span class="meta">${session.totalDrivers ?? rows.length} driver(s)</span>
    </div>
    <div class="class-tabs">
      ${classNames.map(cls => `<button class="class-tab" data-class="${cls}" aria-selected="${cls === ACTIVE_CLASS}">${cls}</button>`).join('')}
    </div>
    <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Pos</th><th>No.</th><th>Driver</th><th>Laps</th><th>Best lap</th>
          <th>${isRace ? 'Gap' : 'Gap to P1'}</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    </div>
  `;

  document.querySelectorAll('.class-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      ACTIVE_CLASS = btn.dataset.class;
      renderLmuBoard(session);
    });
  });
}

function formatGap(ms) {
  if (ms == null) return '–';
  if (ms <= 0) return '-';
  const totalMs = Math.round(ms);
  const minutes = Math.floor(totalMs / 60000);
  const seconds = ((totalMs % 60000) / 1000).toFixed(3);
  return minutes > 0 ? `+${minutes}:${seconds.padStart(6, '0')}` : `+${seconds}`;
}

function parseGapMs(gapStr) {
  // "+1:23.456" or "+12.345"
  const clean = gapStr.replace('+', '');
  const parts = clean.split(':');
  if (parts.length === 2) {
    return (parseInt(parts[0], 10) * 60 + parseFloat(parts[1])) * 1000;
  }
  return parseFloat(clean) * 1000;
}

// Parses SimGrid's own race gap text ("+39.800", "+1:38.461") back to ms for
// the proportional gap bar. Lap-based gaps ("+2 Laps") can't convert to a
// time, so those just render a full bar to visually flag "laps behind".
function parseRaceGapMs(gapText) {
  if (!gapText) return null;
  if (/lap/i.test(gapText)) return null;
  return parseGapMs(gapText);
}

load();
</script>
