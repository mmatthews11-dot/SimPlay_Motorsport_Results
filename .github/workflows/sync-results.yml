name: Sync ACC results from G-Portal

on:
  schedule:
    # Every 15 minutes. Adjust as you like (cron is UTC).
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - name: Pull and parse new results
        env:
          GPORTAL_HOST: ${{ secrets.GPORTAL_HOST }}
          GPORTAL_PORT: ${{ secrets.GPORTAL_PORT }}
          GPORTAL_USERNAME: ${{ secrets.GPORTAL_USERNAME }}
          GPORTAL_PASSWORD: ${{ secrets.GPORTAL_PASSWORD }}
          GPORTAL_RESULTS_PATH: ${{ secrets.GPORTAL_RESULTS_PATH }}
        run: npm run sync

      - name: Commit updated data
        run: |
          git config user.name "acc-results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/results.json
          git diff --staged --quiet || git commit -m "Update results [automated]"
          git push
