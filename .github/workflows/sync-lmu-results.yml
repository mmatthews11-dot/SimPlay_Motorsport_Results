name: Sync LMU results from SimGrid

on:
  schedule:
    # Every 15 minutes. Each workflow now writes to its own separate data
    # file (data/acc-results.json vs data/lmu-results.json), so overlapping
    # with the ACC workflow's schedule is no longer a conflict risk.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Pull and parse new results
        run: npm run sync:lmu
      - name: Commit updated data
        run: |
          git config user.name "lmu-results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/lmu-results.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Update LMU results [automated]"
          git pull --rebase origin main
          git push
